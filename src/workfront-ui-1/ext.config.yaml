operations:
  view:
    - type: web
      impl: index.html
web: web-src
actions: actions
runtimeManifest:
  packages:
    workfront-ui-1:
      license: Apache-2.0
      actions:
        get-projects:
          function: actions/get-projects/index.js
          web: 'yes'
          runtime: 'nodejs:22'
          annotations:
            require-adobe-auth: false
            final: true
        get-project:
          function: actions/get-project/index.js
          web: 'yes'
          runtime: 'nodejs:22'
          annotations:
            require-adobe-auth: false
            final: true
        get-project-comments:
          function: actions/get-project-comments/index.js
          web: 'yes'
          runtime: 'nodejs:22'
          annotations:
            require-adobe-auth: false
            final: true
        get-project-documents:
          function: actions/get-project-documents/index.js
          web: 'yes'
          runtime: 'nodejs:22'
          annotations:
            require-adobe-auth: false
            final: true
        get-project-statuses:
          function: actions/get-project-statuses/index.js
          web: 'yes'
          runtime: 'nodejs:22'
          annotations:
            require-adobe-auth: false
            final: true
hooks:
  pre-app-run: node node_modules/@adobe/uix-guest/scripts/generate-metadata.js
  pre-app-build: node node_modules/@adobe/uix-guest/scripts/generate-metadata.js
  post-app-deploy: ./hooks/post-deploy.js
